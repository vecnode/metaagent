<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MetaAgent</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="layout">
    <header class="hero">
      <div>
        <p class="eyebrow">MetaAgent Desktop</p>
        <h1>Control Panel</h1>
        <p class="subtitle">Portable host with embedded HTTP server and mock particle runtime.</p>
      </div>
      <div class="status-card" id="status-card">
        <div class="status-line"><span>Host</span><strong id="status-host">…</strong></div>
        <div class="status-line"><span>Pattern</span><strong id="status-pattern">…</strong></div>
        <div class="status-line"><span>Particles</span><strong id="status-particles">…</strong></div>
      </div>
    </header>

    <section class="panel">
      <h2>Pattern Controls</h2>
      <div class="button-row">
        <button type="button" data-command="pattern_step_backward">Step Back</button>
        <button type="button" data-command="pattern_step_forward" class="primary">Step Forward</button>
      </div>
      <p id="command-output" class="output"></p>
    </section>

    <section class="panel">
      <h2>Runtime Toggles</h2>
      <div class="button-row">
        <button type="button" data-command="toggle_recording">Recording</button>
        <button type="button" data-command="toggle_autopilot">Autopilot</button>
        <button type="button" data-command="toggle_cinematic_camera">Cinematic</button>
        <button type="button" data-command="toggle_networking_runtime">Networking</button>
      </div>
    </section>

    <section class="panel">
      <h2>Notify</h2>
      <form id="notify-form">
        <input id="notify-input" type="text" placeholder="Send notify event JSON or text">
        <button type="submit" class="primary">Send</button>
      </form>
      <ul id="notify-log" class="log-list"></ul>
    </section>

    <section class="panel">
      <h2>AI Chat</h2>
      <form id="chat-form">
        <textarea id="chat-input" rows="3" placeholder="Ask Ollama (requires local Ollama)"></textarea>
        <button type="submit" class="primary">Send</button>
      </form>
      <pre id="chat-output" class="chat-output"></pre>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
